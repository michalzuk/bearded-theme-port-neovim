name: Bug report
description: Report a problem with bearded.nvim
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Thanks for reporting an issue.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug.
    validations:
      required: true
  - type: input
    id: nvim
    attributes:
      label: Neovim version
      placeholder: "nvim --version"
    validations:
      required: true
  - type: input
    id: variant
    attributes:
      label: Theme variant
      placeholder: "arc, monokai-terra, ..."
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Exact steps to reproduce.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
