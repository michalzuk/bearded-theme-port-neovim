name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: tests (nvim-${{ matrix.neovim }})
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.allow_failure }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - neovim: stable
            allow_failure: false
          - neovim: nightly
            allow_failure: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Neovim
        uses: MunifTanjim/setup-neovim-action@v1
        with:
          tag: ${{ matrix.neovim }}

      - name: Show tool versions
        run: |
          python3 --version
          nvim --version

      - name: Python syntax checks
        run: python3 -m compileall -q scripts tests

      - name: Core tests
        run: python3 -m unittest discover -s tests
